<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protein Crystallization Predictor</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --border-color: #dee2e6;
            --btn-bg: #495057;
            --btn-text: #ffffff;
            --btn-hover: #343a40;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            --surface-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface-color);
            padding: 2.5rem;
            border-radius: 4px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 120px;
            box-sizing: border-box;
            background-color: var(--surface-color);
            color: var(--text-color);
        }

        textarea:focus {
            outline: none;
            border-color: #adb5bd;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        .result-box {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }

        .result-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 1rem;
        }

        .error-text {
            color: #c92a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Protein Crystallization</h1>
        <p class="subtitle">Predict sequence crystallization likelihood</p>

        <form method="POST">
            <div class="form-group">
                <label for="sequence">Amino Acid Sequence</label>
                <textarea 
                    id="sequence" 
                    name="sequence" 
                    placeholder="Enter protein sequence..."
                    required
                >{{ sequence }}</textarea>
            </div>
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
        <div class="result-box">
            <div class="result-title">Result</div>
            <div>{{ prediction }}</div>
        </div>
        {% endif %}

        {% if error %}
        <div class="result-box">
            <div class="result-title error-text">Error</div>
            <div class="error-text">{{ error }}</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
